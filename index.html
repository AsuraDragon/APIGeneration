<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>API Creation - Sequelize Builder</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <h1>API Creation</h1>
            <p>Sequelize Model Generator</p>
        </header>

        <main class="container">
            <section class="builder-pane">
                <div class="actions">
                    <button id="add-table-btn" class="primary-btn">+ Add Table</button>
                </div>
                <div id="tables-container"></div>
            </section>

            <section class="preview-pane">
                <div class="preview-header">
                    <h2>Generated Code</h2>
                    <button id="download-btn" class="secondary-btn">Download .js</button>
                </div>
                <pre><code id="code-output">// Your Sequelize models will appear here...</code></pre>
            </section>
        </main>

        <script src="app.js"></script>
    </body>
</html>
