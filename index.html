<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>API Creation - Sequelize Builder</title>
        <link rel="stylesheet" href="style.css" />
        <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    </head>
    <body>
        <header>
            <h1>Sequelize Model Builder</h1>
            <p>Design your database tables and relations visually.</p>
        </header>

        <main class="container">
            <section class="builder-pane">
                <button id="add-table-btn" class="primary-btn" style="margin-bottom: 1rem">+ Add New Table</button>
                <div id="tables-container"></div>
            </section>

            <section class="preview-pane" style="overflow-y: auto">
                <div class="preview-header">
                    <h2>Models (db.js)</h2>
                    <button id="download-db-btn" class="secondary-btn">Download db.js</button>
                </div>
                <pre style="height: 300px"><code id="code-output" class="language-javascript"></code></pre>

                <div class="preview-header" style="margin-top: 1rem">
                    <h2>Server (server.js)</h2>
                    <button id="download-server-btn" class="secondary-btn">Download server.js</button>
                </div>
                <pre style="height: 400px"><code id="server-output" class="language-javascript"></code></pre>
            </section>
        </main>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
